name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Create Secrets.swift
        run: |
          cp samples/CameraAccess/CameraAccess/Secrets.swift.example samples/CameraAccess/CameraAccess/Secrets.swift
          sed -i '' 's/YOUR_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g' samples/CameraAccess/CameraAccess/Secrets.swift
          sed -i '' 's|http://YOUR_MAC_HOSTNAME.local|http://104.236.38.223|g' samples/CameraAccess/CameraAccess/Secrets.swift
          sed -i '' 's/YOUR_OPENCLAW_GATEWAY_TOKEN/${{ secrets.OPENCLAW_GATEWAY_TOKEN }}/g' samples/CameraAccess/CameraAccess/Secrets.swift
          sed -i '' 's/YOUR_OPENCLAW_HOOK_TOKEN//g' samples/CameraAccess/CameraAccess/Secrets.swift
          sed -i '' 's|ws://YOUR_MAC_IP:8080||g' samples/CameraAccess/CameraAccess/Secrets.swift

      - name: Build IPA (unsigned)
        run: |
          xcodebuild \
            -project samples/CameraAccess/CameraAccess.xcodeproj \
            -scheme CameraAccess \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p output
          find build -name '*.app' -exec cp -r {} output/ ;
          cd output
          mkdir Payload
          mv *.app Payload/
          zip -r VisionClaw.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VisionClaw-IPA
          path: output/VisionClaw.ipa
          retention-days: 7